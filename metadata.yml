Interpretation: "Three binary outputs indicating whether the compound meets each of
  the eNTRy rules, namely low globularity,\nlow number of rotatable bonds, and presence
  of a primary amine group. A value of 1 indicates that the compound\nmeets the respective
  criterion, while a value of 0 indicates that it does not."
